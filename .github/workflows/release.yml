name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run tauri build

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          Compress-Archive -Path src-tauri/target/release/envarly.exe `
            -DestinationPath "src-tauri/target/release/bundle/Envarly_${version}_x64-portable.zip"

      - name: Generate checksums
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $files = @(
            Get-ChildItem "$bundle/nsis/*.exe"
            Get-ChildItem "$bundle/msi/*.msi"
            Get-ChildItem "$bundle/Envarly_*-portable.zip"
          )
          $files |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash -Algorithm SHA256 $_.FullName
              "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
            } |
            Set-Content "$bundle/SHA256SUMS.txt"

      - name: Upload installers
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/Envarly_*-portable.zip
            src-tauri/target/release/bundle/SHA256SUMS.txt
