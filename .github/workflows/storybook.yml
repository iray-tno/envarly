name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Install LP dependencies
        run: npm ci
        working-directory: lp

      - name: Build LP
        run: npm run build
        working-directory: lp

      - name: Arrange site structure
        run: |
          mkdir -p site
          cp -r lp/dist/. site/
          mv storybook-static site/storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
