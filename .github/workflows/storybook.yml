name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Install LP dependencies
        run: npm ci
        working-directory: lp

      - name: Build LP
        run: npm run build
        working-directory: lp

      - name: Report (Vitest)
        run: |
          mkdir -p junit-reports
          npx vitest run --reporter=junit --outputFile=junit-reports/vitest.xml || true

      - name: Report (Biome)
        run: npx biome check --reporter=json src 2>/dev/null | node scripts/biome-to-junit.mjs > junit-reports/biome.xml || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: taiki-e/install-action@nextest

      - name: Report (cargo nextest)
        run: cargo nextest run --profile ci || true
        working-directory: src-tauri
        continue-on-error: true

      - name: Copy nextest JUnit
        run: cp src-tauri/target/nextest/ci/nextest.xml junit-reports/nextest.xml || true

      - name: Report (Clippy)
        run: cargo clippy --message-format=json 2>/dev/null | node ../../scripts/clippy-to-junit.mjs > ../../junit-reports/clippy.xml || true
        working-directory: src-tauri

      - name: Arrange site structure
        run: |
          mkdir -p site
          cp -r lp/dist/. site/
          mv storybook-static site/storybook

      - name: Build HTML reports
        run: |
          mkdir -p site/reports
          npx xunit-viewer --results junit-reports --output site/reports/index.html --title "Envarly — Reports"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
